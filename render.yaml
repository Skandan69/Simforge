services:
  - type: web
    name: simforge-api
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev && npm run render-build
    startCommand: npm run start --workspace @simforge/api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEB_URL
        sync: false
      - key: FRONTEND_URL
        value: https://simforge-web-pi.vercel.app
